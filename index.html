<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>验证身份</title>
    <style>
        body {
            background: #1a1a1a;
            color: white;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden; /* 防止出现滚动条 */
        }
        .box {
            text-align: center;
            background: #333;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        input {
            padding: 12px;
            border: none;
            border-radius: 4px;
            width: 200px;
            margin-bottom: 20px;
            outline: none;
        }
        button {
            padding: 12px 24px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        button:hover {
            background: #0056b3;
        }
        /* 全屏 iframe 的样式 */
        .fullscreen-iframe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 9999;
            background: white;
        }
    </style>
</head>
<body>

<div id="login-box" class="box">
    <h2>请输入访问密码</h2>
    <input type="password" id="pw" placeholder="在此输入密码..." autocomplete="off">
    <br>
    <button onclick="verify()">进入网页</button>
</div>

<script>
    function verify() {
        const pw = document.getElementById('pw').value;
        
        // 密码与网址的映射表
        const links = {
            "fakyou": "https://example.com",
            "chinese": "https://Andy78GG.github.io/Eaglercraft-1",
            "7878": "https://Andy78GG.github.io/Eaglercraft/"
        };

        if (links[pw]) {
            // --- 方案 A 核心代码 ---
            const targetUrl = links[pw];
            
            // 直接清空 body 并插入全屏 iframe
            document.body.innerHTML = `
                <iframe src="${targetUrl}" class="fullscreen-iframe"></iframe>
            `;
            
            // 修改网页标题，伪装成 Google Classroom 或其他
            document.title = "Google Classroom";
            
            // 提示：按 F5 刷新即可快速退回登录界面
        } else {
            alert("密码错误，访问被拒绝！");
        }
    }

    // 监听回车键
    document.getElementById('pw').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') verify();
    });
</script>

</body>
</html>
