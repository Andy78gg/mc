<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>验证身份</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { text-align: center; background: #333; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { padding: 12px; border: none; border-radius: 4px; width: 200px; margin-bottom: 20px; }
        button { padding: 12px 24px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <div class="box">
        <h2>请输入访问密码</h2>
        <input type="password" id="pw" placeholder="在此输入密码...">
        <br>
        <button onclick="verify()">进入网页</button>
    </div>

    <script>
function verify() {
    const pw = document.getElementById('pw').value;
    
    // 在这里定义密码和对应的网址
    const links = {
        "fakyou": "https://example.com",
        "chinese": "https://example.com",
        "7878": "https://d27hwy879n81fgi18t1h7c901csh198yjniu19d.github.io/Eaglercraft-g6781oihuhvgty76890onjb1hvft78790kodyg6r5e45edtrfgvhjbio907564rtdgvjhbki90u876r7thdi09wg/"
    };

    // 检查输入的密码是否存在于列表中
    if (links[pw]) {
        window.location.href = links[pw];
    } else {
        alert("密码错误，访问被拒绝！");
    }
}
    </script>
</body>
</html>
