<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>验证身份</title>
    <style>
        body {
            background: #1a1a1a;
            color: white;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .box {
            text-align: center;
            background: #333;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        input {
            padding: 12px;
            border: none;
            border-radius: 4px;
            width: 200px;
            margin-bottom: 20px;
            outline: none;
        }
        button {
            padding: 12px 24px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>请输入访问密码</h2>
    <input type="password" id="pw" placeholder="在此输入密码..." autocomplete="off">
    <br>
    <button onclick="verify()">进入网页</button>
</div>

<script>
    function verify() {
        const pw = document.getElementById('pw').value;
        
        // 密码与网址的映射表
        const links = {
            "fakyou": "https://example.com",
            "chinese": "https://Andy78GG.github.io/Eaglercraft-1",
            "7878": "Andy78GG.github.io/Eaglercraft/"
        };

        if (links[pw]) {
            // 1. 创建一个新的空白窗口
            const win = window.open('about:blank', '_blank');
            
            if (win) {
                // 2. 往新窗口写入全屏 iframe 代码
                win.document.write(`
                    <html>
                    <head>
                        <title>My App</title>
                        <style>
                            body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
                            iframe { width: 100%; height: 100%; border: none; }
                        </style>
                    </head>
                    <body>
                        <iframe src="${links[pw]}"></iframe>
                    </body>
                    </html>
                `);
                win.document.close();
            } else {
                alert("由于浏览器拦截了弹窗，请允许弹窗后再试。");
            }
        } else {
            alert("密码错误，访问被拒绝！");
        }
    }

    // 监听回车键
    document.getElementById('pw').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') verify();
    });
</script>

</body>
</html>
